name: Daily greetings

on:
  schedule:
    # Runs at 08:00 IST (02:30 UTC) every day.
    # Monday runs also catch up Saturday and Sunday birthdays/anniversaries.
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD) -- leave blank for today"
        required: false
      dry_run:
        description: "Dry run -- generate posters but skip sending"
        type: boolean
        default: false

jobs:
  send-greetings:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Allow the job to push back the sent log
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets.toml
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml << EOF
          smtp_sender = "${{ secrets.SMTP_SENDER }}"
          smtp_password = "${{ secrets.SMTP_PASSWORD }}"
          withoutbg_api_key = "${{ secrets.WITHOUTBG_API_KEY }}"
          api_auth_header_value = "${{ secrets.API_AUTH_HEADER_VALUE }}"
          EOF

      - name: Restore sent log from git
        run: |
          mkdir -p storage
          echo "Sent log lines: $(wc -l < storage/sent_log.jsonl 2>/dev/null || echo 0)"

      - name: Run daily greeter
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python daily_run.py $ARGS

      - name: Commit updated sent log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p storage
          touch storage/sent_log.jsonl
          git add storage/sent_log.jsonl
          if git diff --cached --quiet; then
            echo "No new sent-log entries -- nothing to commit."
          else
            git commit -m "chore: update sent log [skip ci]"
            git push
          fi

      - name: Upload generated posters as artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posters-${{ github.run_id }}
          path: storage/output/
          retention-days: 7
